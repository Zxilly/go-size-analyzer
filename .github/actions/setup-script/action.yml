name: Setup test script
description: 'Setup test script, should be called after checkout'
inputs:
  cache:
    default: ""
    description: 'Cache key for test bins'
  report:
    default: "false"
    required: false
    description: 'Report results'
  script:
    required: true
    description: 'Script to run'
  coverage:
    default: "false"
    required: false
    description: "Collect coverage"
  cache-python:
    default: "true"
    required: false
    description: "Cache python dependencies"
runs:
  using: 'composite'
  steps:
  
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        working-directory: './scripts'

    - name: Add python dependencies
      shell: bash
      working-directory: ./scripts
      run: |
        uv sync

    - name: Cache test binaries
      if: ${{ inputs.cache != '' }}
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ./scripts/bins
        key: testbins-${{ hashFiles('scripts/binaries.csv') }}-${{ inputs.cache }}-v2
        enableCrossOsArchive: true

    - name: Run script
      shell: bash
      working-directory: ./scripts
      run: uv run ${{ inputs.script }}

    - name: Dump test logs on failure
      if: ${{ failure() }}
      shell: bash
      run: |
        echo "::group::Test output logs"
        find results -name '*.output.txt' -print -exec cat {} \; 2>/dev/null || true
        echo "::endgroup::"
        echo "::group::Unit test logs"
        find results/unit -name '*.txt' -print -exec cat {} \; 2>/dev/null || true
        echo "::endgroup::"

    - name: Report results
      if: ${{ inputs.report == 'true' }}
      shell: bash
      working-directory: ./scripts
      run: uv run python report.py
